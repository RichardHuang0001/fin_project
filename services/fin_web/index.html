<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinMind - 智能金融分析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: row; overflow: hidden; margin: 0; }
        #sidebar { width: 260px; height: 100vh; flex-shrink: 0; background-color: #f8fafc; border-right: 1px solid #e2e8f0; transition: all 0.3s ease; }
        main { flex: 1; height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #chat-container { flex: 1; overflow-y: auto; scroll-behavior: smooth; padding-bottom: 200px; position: relative; }
        .sidebar-item-active { background-color: #f1f5f9; color: #0f172a; border-right: 3px solid #2563eb; }
        .chat-bubble-user { background-color: #f8fafc; color: #1e293b; border: 1px solid #e2e8f0; border-radius: 1rem; }
        .chat-bubble-assistant { background-color: transparent; color: #1e293b; border-radius: 1rem; }
        .markdown-body { background-color: transparent !important; font-size: 14px !important; color: inherit !important; font-family: inherit !important; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { border-bottom: 1px solid #f1f5f9; padding-bottom: 0.5rem; margin-top: 1.5rem; }
        .markdown-body table { display: table; width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
        .markdown-body th, .markdown-body td { border: 1px solid #e2e8f0; padding: 8px; text-align: left; }
        .markdown-body th { background-color: #f8fafc; }
        .markdown-body blockquote { border-left: 4px solid #e2e8f0; color: #64748b; padding-left: 1rem; margin-left: 0; }
        .action-btn { transition: all 0.2s; color: #64748b; padding: 0.25rem !important; position: relative; }
        .action-btn:hover { color: #0f172a; background-color: #f1f5f9; }
        .action-btn i { width: 14px !important; height: 14px !important; }
        
        .loading-dots:after { content: ' .'; animation: dots 1s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 40% { color: #64748b; text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .5em 0 0 #64748b, 1em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .5em 0 0 #64748b, 1em 0 0 #64748b; } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .dropdown-menu { display: none; position: absolute; bottom: 100%; right: 0; background: white; border: 1px solid #e2e8f0; border-radius: 0.5rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); z-index: 50; min-width: 120px; }
        .dropdown-menu.show { display: block; }

        /* Toast notification */
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 8px 16px; border-radius: 8px; font-size: 12px; z-index: 100; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body class="bg-white text-slate-900 h-screen flex overflow-hidden">
    <!-- Sidebar -->
    <aside id="sidebar" class="w-64 bg-slate-50 border-r border-slate-200 flex flex-col h-full transition-all duration-300 z-30">
        <div class="p-5 flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white shadow-lg shadow-blue-200">
                <i data-lucide="brain-circuit" size="18"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-slate-800">FinMind</h1>
        </div>
        
        <div class="px-4 py-2">
            <button id="new-chat-btn" class="w-full py-2.5 px-4 bg-white border border-slate-200 rounded-xl text-sm font-medium text-slate-700 hover:bg-slate-100 transition-all flex items-center justify-center gap-2 shadow-sm">
                <i data-lucide="plus" size="16"></i>
                新建分析
            </button>
        </div>

        <div class="mt-6 px-5 mb-2">
            <h3 class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider">历史对话</h3>
        </div>
        <div class="flex-1 overflow-y-auto px-2 space-y-1" id="history-list">
            <!-- History items will be injected here -->
        </div>
        
        <div class="p-4 border-t border-slate-200">
            <div class="flex items-center gap-3 p-2 rounded-xl hover:bg-slate-100 cursor-pointer transition-colors">
                <div class="w-8 h-8 bg-slate-200 rounded-full flex items-center justify-center text-slate-500">
                    <i data-lucide="user" size="16"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-slate-700 truncate">测试用户</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full relative bg-white">
        <!-- Header -->
        <header class="h-14 border-b border-slate-100 flex items-center px-6 justify-between sticky top-0 z-20 bg-white/80 backdrop-blur-md">
            <div class="flex items-center gap-3">
                <button id="toggle-sidebar" class="p-2 hover:bg-slate-100 rounded-lg text-slate-500 lg:hidden">
                    <i data-lucide="menu" size="20"></i>
                </button>
            </div>
            <div class="absolute left-1/2 -translate-x-1/2 flex flex-col items-center">
                <h2 id="current-chat-title" class="text-sm font-semibold text-slate-800 truncate max-w-[300px]">新对话</h2>
            </div>
            <div class="flex items-center gap-4">
                <button class="text-slate-400 hover:text-slate-600 transition-colors"><i data-lucide="settings" size="18"></i></button>
            </div>
        </header>

        <!-- Chat Container -->
        <div id="chat-container" class="flex-1 p-4 md:p-8 space-y-8">
            <!-- Welcome Screen -->
            <div class="max-w-3xl mx-auto flex flex-col gap-10 py-12" id="welcome-screen">
                <div class="text-center space-y-4">
                    <div class="w-20 h-20 bg-blue-50 text-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-inner">
                        <i data-lucide="sparkles" size="40"></i>
                    </div>
                    <h3 class="text-4xl font-bold text-slate-900 tracking-tight">为您洞察市场先机</h3>
                    <p class="text-slate-500 text-lg max-w-lg mx-auto">我是 FinMind，您的专业 A 股分析助手。输入股票代码或名称，我将为您生成深度研报。</p>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 mt-4">
                    <button class="suggestion-btn p-3 bg-slate-50 border border-slate-100 rounded-2xl text-left hover:border-blue-200 hover:bg-blue-50 transition-all group">
                        <div class="text-xs font-medium text-slate-800 mb-1 group-hover:text-blue-600">分析嘉友国际(603871)</div>
                        <div class="text-[10px] text-slate-400 line-clamp-1">查看跨境物流龙头核心竞争力</div>
                    </button>
                    <button class="suggestion-btn p-3 bg-slate-50 border border-slate-100 rounded-2xl text-left hover:border-blue-200 hover:bg-blue-50 transition-all group">
                        <div class="text-xs font-medium text-slate-800 mb-1 group-hover:text-blue-600">比亚迪最近表现如何</div>
                        <div class="text-[10px] text-slate-400 line-clamp-1">技术面走势与最新产销数据分析</div>
                    </button>
                    <button class="suggestion-btn p-3 bg-slate-50 border border-slate-100 rounded-2xl text-left hover:border-blue-200 hover:bg-blue-50 transition-all group">
                        <div class="text-xs font-medium text-slate-800 mb-1 group-hover:text-blue-600">贵州茅台估值分析</div>
                        <div class="text-[10px] text-slate-400 line-clamp-1">白酒龙头的 PE 分位点与投资价值</div>
                    </button>
                    <button class="suggestion-btn p-3 bg-slate-50 border border-slate-100 rounded-2xl text-left hover:border-blue-200 hover:bg-blue-50 transition-all group">
                        <div class="text-xs font-medium text-slate-800 mb-1 group-hover:text-blue-600">宁德时代财务状况</div>
                        <div class="text-[10px] text-slate-400 line-clamp-1">分析其资产负债率与现金流表现</div>
                    </button>
                    <button class="suggestion-btn p-3 bg-slate-50 border border-slate-100 rounded-2xl text-left hover:border-blue-200 hover:bg-blue-50 transition-all group">
                        <div class="text-xs font-medium text-slate-800 mb-1 group-hover:text-blue-600">半导体行业最新研报</div>
                        <div class="text-[10px] text-slate-400 line-clamp-1">从宏观和技术面分析芯片板块</div>
                    </button>
                    <button class="suggestion-btn p-3 bg-slate-50 border border-slate-100 rounded-2xl text-left hover:border-blue-200 hover:bg-blue-50 transition-all group">
                        <div class="text-xs font-medium text-slate-800 mb-1 group-hover:text-blue-600">平安银行值得买吗</div>
                        <div class="text-[10px] text-slate-400 line-clamp-1">结合分红率与坏账率的深度评估</div>
                    </button>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="absolute bottom-0 left-0 right-0 p-6 bg-white/80 backdrop-blur-sm border-t border-slate-100">
            <div class="max-w-3xl mx-auto">
                <div class="relative group">
                    <div class="absolute -inset-0.5 bg-gradient-to-r from-blue-500 to-indigo-500 rounded-2xl blur opacity-10 group-focus-within:opacity-30 transition duration-500"></div>
                    <div class="relative bg-white rounded-2xl border border-slate-200 p-2 flex items-end gap-2 shadow-xl shadow-slate-200/50">
                        <textarea id="user-input" rows="1" class="flex-1 bg-transparent border-none focus:ring-0 resize-none py-3 px-4 max-h-48 text-slate-700 text-sm" placeholder="输入股票代码或名称，如 '分析 600519'..."></textarea>
                        <button id="send-btn" class="bg-slate-900 hover:bg-slate-800 text-white p-2.5 rounded-xl transition-all shadow-lg shadow-slate-200 disabled:opacity-30 disabled:cursor-not-allowed">
                            <i data-lucide="arrow-up" size="20"></i>
                        </button>
                    </div>
                </div>
                <div class="mt-3 flex justify-center gap-6 text-[10px] text-slate-400 font-medium">
                    <span class="flex items-center gap-1"><i data-lucide="shield-check" size="12"></i> 专业金融模型</span>
                    <span class="flex items-center gap-1"><i data-lucide="clock" size="12"></i> 实时市场数据</span>
                    <span class="flex items-center gap-1"><i data-lucide="info" size="12"></i> 仅供参考，非投资建议</span>
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="toast">已复制到剪贴板</div>
    <script src="script.js"></script>
</body>
</html>
